{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>

    body{

        margin: 0px;
    }

.navbar {
    position: absolute;
    top: 0;
    width: 100%;
    z-index: 4;
    background-color: transparent;
    
}

.navlogo {
    font-size: 34px;
    letter-spacing: 3px;
    color: white !important;
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;    
}


.nav-link {
    color: white !important;
    font-size: 20px;
    letter-spacing: 1px;
    margin-right: 20px;
}


.nav-link:hover {
    opacity: 0.5;
}


/* hamburger icon color on mobile */
.navbar-toggler-icon {
    filter: invert(1);
}


.navbar-toggler {
    border-color: white;
}


.bg {
    display: flex;
    background-image: url('{% static "images/hp9.jpg" %}');
    background-position: center;
    background-size: cover;       
    height: 100vh;
    background-attachment: fixed;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}


/* dark overlay trick */
.bg::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.49);
}


.mainitems{
    position: relative;
    top: 0px;
}


.dots{
    font-size: 31px;
    color: aliceblue;
    letter-spacing: 8px;
    margin: 15px 0px;
}


h1{
    font-size: 50px;
    color: #f4f5f6ef;
    letter-spacing: 10px;
    margin:5px 0px;
}


.tagline{
    color: white;
    font-style: italic;
    font-size: 22px;
    margin: 18px 0px;
    margin-right: 20px;
    letter-spacing: 1px;
    font-weight: 540;
}

button{
    position: relative;
    background-color: white;
    top: 41px;
    right: 0px;
    font-size: 23px;
    border: 1px solid rgb(249, 248, 246);
    width: 190px;
    font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    border-radius: 20%;
    letter-spacing: 2px;
}

button a{
    color: #050505ef;
    text-decoration: none;

    
}

button:hover{
    transform: scale(1.1);
    transition: transform 2s ease;

}



</style>


</head>
<body>

    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <!-- logo -->
        <a class="navbar-brand navlogo" href="{% url 'home' %}"><i>CAFÉ</i></a>

        <!-- hamburger button for mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- nav links -->
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav gap-4">
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'cakes' %}">Celebration Cakes</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'reservation' %}">Reservation</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
            </ul>
        </div>

    </div>
</nav>




<div class="bg">
    <!-- LOGO AND ITEMS -->

    <div class="mainitems">
        <p class="dots">.......................</p>
        <h1>ZYVARA </BR>CAFÉ </h1>
        <p class="dots">.......................</p> 
        <p class="tagline"><b>--</b>Where every sip tells a story<b>--</b></p>
        <button> <a href="{% url 'about' %}"><i><b>EXPLORE</b>  </i></a></button>

    </div>


</div>


</body>
</html>
