{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>

    

    body{

        margin: 0px;
    }

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 4;
    background-color: transparent;
}

.navlogo {
    font-size: 34px;
    letter-spacing: 3px;
    color: white !important;
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;    
}

.nav-link {
    color: white !important;
    font-size: 20px;
    letter-spacing: 1px;
    margin-right: 20px;
}

.nav-link:hover {
    opacity: 0.5;
}

/* hamburger icon color on mobile */
.navbar-toggler-icon {
    filter: invert(1);
}

.navbar-toggler {
    border-color: white;
}


.bg {
    display: flex;
    background-image: url('{% static "images/hp9.jpg" %}');
    background-position: center;
    background-size: cover;       
    height: 100vh;
    background-attachment: fixed;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}
/* dark overlay trick */
.bg::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.49);
}

.maincontainer {
        display: flex;
        flex-direction: column;
        position: relative;
        background-color: transparent;
        height: auto;
        padding-top: 180px;
        width: 100%;        
        max-width: 1300px; 
        color: whitesmoke;
    }

.container1{
        color: whitesmoke;
        font-family: 'Playfair Display', serif;
        height: auto; 
        top:0px;           
        padding: 60px 0 40px 0;
    }


    .container2{
        padding: 40px;
        top: 150px;
        margin-top: 190px;
        align-items: center;
        justify-content: center;
        background-color:rgba(0,0,0,0.4) ;
    }


    .container2 input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0px 1000px rgba(0,0,0,0.3) inset;
    -webkit-text-fill-color: white;
}










</style>


</head>
<body>

    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

        <!-- logo -->
        <a class="navbar-brand navlogo" href="{% url 'home' %}"><i>CAFÉ</i></a>

        <!-- hamburger button for mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- nav links -->
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav gap-4">
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'menu' %}">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'cakes' %}">Celebration Cakes</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'reservation' %}">Reservation</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
            </ul>
        </div>

    </div>
</nav>
<div class="bg">
    <div class="maincontainer">
        <div class="container1">
            <h1 style="font-size: 120px;">Grab A Table.</h1>
        </div>

        <div class="container2">
            <div class="row g-3"  style="background-color: rgba(0,0,0,0.5);">




                <div class="col-md-6">
            <div class="form-floating">
            <input type="text" class="form-control" placeholder=" " id="floatingInputGrid" >
            <label for="floatingInputGrid">Name</label>
        </div>
        </div>

</div>
</div>


</div>


</body>
</html>
